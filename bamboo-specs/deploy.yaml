---
version: 2
triggers: [ ]

plan:
  project-key: CL
  key: TTE
  name: TrustTunnel - Deploy

stages:
  - Build artifacts:
      manual: false
      final: false
      jobs:
        - Build on Linux
        - Build on macOS
  - Deploy artifacts:
      manual: false
      final: false
      jobs:
        - Deploy artifacts

Build on Linux:
  key: BL
  docker:
    image: adguard/core-libs:2.8
    volumes:
      ${bamboo.working.directory}: ${bamboo.working.directory}
      ${bamboo.tmp.directory}: ${bamboo.tmp.directory}
      ${bamboo.git.cache.directory}: ${bamboo.git.cache.directory}
      ${system.HOME}/.ssh: /root/.ssh
    docker-run-arguments: [ ]
  tasks:
    - !include docker-clean.yaml
    - checkout:
        description: Checkout Default Repository
        force-clean-build: 'true'
    - script:
        interpreter: SHELL
        scripts:
          - |-
            #!/bin/bash
            set -x -e

            ENDPOINT_ROOT=${PWD}

            # Build for x86_64 (use musl for static binaries)
            CC=x86_64-linux-musl-gcc \
            CXX=x86_64-linux-musl-g++ \
            CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=x86_64-linux-musl-gcc \
            BINDGEN_EXTRA_CLANG_ARGS="--sysroot=/opt/cross/x86_64-linux-musl" \
            cargo build --release --target x86_64-unknown-linux-musl

            # Build for aarch64 (use musl for static binaries)
            CC=aarch64-linux-musl-gcc \
            CXX=aarch64-linux-musl-g++ \
            CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc \
            BINDGEN_EXTRA_CLANG_ARGS="--sysroot=/opt/cross/aarch64-linux-musl" \
            cargo build --release --target aarch64-unknown-linux-musl

            mkdir -p build_linux
            VERSION=$(cat endpoint/Cargo.toml | grep "version = " | head -n 1 | sed -e 's/version = "\(.*\)"/\1/')
            
            # Set up GPG for signing binaries
            GPG_KEY=devteam@adguard.com
            echo "${bamboo.gpgSecretKeyPart1}${bamboo.gpgSecretKeyPart2}"\
                        | awk '{ gsub(/\\n/, "\n"); print; }'\
                        | gpg --import --batch --yes

            pushd target/aarch64-unknown-linux-musl/release/
              llvm-objcopy --only-keep-debug trusttunnel_endpoint trusttunnel_endpoint.debug
              llvm-strip trusttunnel_endpoint
              llvm-objcopy --add-gnu-debuglink=trusttunnel_endpoint.debug trusttunnel_endpoint
              llvm-objcopy --only-keep-debug setup_wizard setup_wizard.debug
              llvm-strip setup_wizard
              llvm-objcopy --add-gnu-debuglink=setup_wizard.debug setup_wizard
              cp ${ENDPOINT_ROOT}/LICENSE .
              cp ${ENDPOINT_ROOT}/scripts/trusttunnel.service.template .
              # Sign binaries with GPG
              gpg --default-key "${GPG_KEY}" \
                  --detach-sig \
                  --passphrase "${bamboo.gpgPassword}" \
                  --pinentry-mode loopback \
                  trusttunnel_endpoint
              gpg --default-key "${GPG_KEY}" \
                  --detach-sig \
                  --passphrase "${bamboo.gpgPassword}" \
                  --pinentry-mode loopback \
                  setup_wizard
              NAME=trusttunnel-v${VERSION}-linux-aarch64
              tar zcf ${NAME}.tar.gz --transform "s,^,${NAME}/," trusttunnel_endpoint trusttunnel_endpoint.sig setup_wizard setup_wizard.sig LICENSE trusttunnel.service.template
              mv ${NAME}.tar.gz ${ENDPOINT_ROOT}/build_linux

              NAME_DBG=${NAME}-dbgsym
              tar zcf ${NAME_DBG}.tar.gz --transform "s,^,${NAME_DBG}/," trusttunnel_endpoint.debug setup_wizard.debug
              mv ${NAME_DBG}.tar.gz ${ENDPOINT_ROOT}/build_linux
            popd

            pushd target/x86_64-unknown-linux-musl/release/
              llvm-objcopy --only-keep-debug trusttunnel_endpoint trusttunnel_endpoint.debug
              llvm-strip trusttunnel_endpoint
              llvm-objcopy --add-gnu-debuglink=trusttunnel_endpoint.debug trusttunnel_endpoint
              llvm-objcopy --only-keep-debug setup_wizard setup_wizard.debug
              llvm-strip setup_wizard
              llvm-objcopy --add-gnu-debuglink=setup_wizard.debug setup_wizard
              cp ${ENDPOINT_ROOT}/LICENSE .
              cp ${ENDPOINT_ROOT}/scripts/trusttunnel.service.template .
              # Sign binaries with GPG
              gpg --default-key "${GPG_KEY}" \
                  --detach-sig \
                  --passphrase "${bamboo.gpgPassword}" \
                  --pinentry-mode loopback \
                  trusttunnel_endpoint
              gpg --default-key "${GPG_KEY}" \
                  --detach-sig \
                  --passphrase "${bamboo.gpgPassword}" \
                  --pinentry-mode loopback \
                  setup_wizard
              NAME=trusttunnel-v${VERSION}-linux-x86_64
              tar zcf ${NAME}.tar.gz --transform "s,^,${NAME}/," trusttunnel_endpoint trusttunnel_endpoint.sig setup_wizard setup_wizard.sig LICENSE trusttunnel.service.template
              mv ${NAME}.tar.gz ${ENDPOINT_ROOT}/build_linux

              NAME_DBG=${NAME}-dbgsym
              tar zcf ${NAME_DBG}.tar.gz --transform "s,^,${NAME_DBG}/," trusttunnel_endpoint.debug setup_wizard.debug
              mv ${NAME_DBG}.tar.gz ${ENDPOINT_ROOT}/build_linux
            popd
  requirements:
    - adg-privileged-docker
  artifact-subscriptions: [ ]
  artifacts:
    - name: Build for Linux
      location: build_linux
      pattern: 'trusttunnel-*.tar.gz'
      required: true
      shared: true

Build on macOS:
  key: BM
  tasks:
    - checkout:
        description: Checkout Default Repository
        force-clean-build: 'true'
    - script:
        interpreter: SHELL
        scripts:
          - |-
            #!/bin/bash
            set -x -e

            ENDPOINT_ROOT=${PWD}
            CODESIGN_IDENTITY="Developer ID Application: Adguard Software Limited (TC3Q7MAJXF)"
            CODESIGN_IDENTIFIER="com.adguard.trusttunnel.endpoint"
            export BUILD_DIR=build_macos

            printf "%b\n" "${bamboo_sshSecretKey}" | ssh-add -

            bundle config --local path '.bundle/vendor'
            bundle config
            bundle install
            bundle exec fastlane remove_certs || true
            bundle exec fastlane certs

            mkdir -p build_macos
            VERSION=$(cat endpoint/Cargo.toml | grep "version = " | head -n 1 | sed -e 's/version = "\(.*\)"/\1/')

            GPG_KEY=devteam@adguard.com
            echo "${bamboo.gpgSecretKeyPart1}${bamboo.gpgSecretKeyPart2}"\
                        | awk '{ gsub(/\\n/, "\n"); print; }'\
                        | gpg --import --batch --yes

            cargo build --release --target x86_64-apple-darwin
            cargo build --release --target aarch64-apple-darwin

            lipo -create \
              -output build_macos/trusttunnel_endpoint \
              target/x86_64-apple-darwin/release/trusttunnel_endpoint \
              target/aarch64-apple-darwin/release/trusttunnel_endpoint

            lipo -create \
              -output build_macos/setup_wizard \
              target/x86_64-apple-darwin/release/setup_wizard \
              target/aarch64-apple-darwin/release/setup_wizard

            lipo -info build_macos/trusttunnel_endpoint
            lipo -info build_macos/setup_wizard

            dsymutil build_macos/trusttunnel_endpoint -o build_macos/trusttunnel_endpoint.dSYM
            dsymutil build_macos/setup_wizard -o build_macos/setup_wizard.dSYM

            strip build_macos/trusttunnel_endpoint
            strip build_macos/setup_wizard

            codesign -f -s "${CODESIGN_IDENTITY}" -i "${CODESIGN_IDENTIFIER}" --options=runtime build_macos/trusttunnel_endpoint
            codesign -f -s "${CODESIGN_IDENTITY}" -i "${CODESIGN_IDENTIFIER}" --options=runtime build_macos/setup_wizard

            bundle exec fastlane notari id:"${CODESIGN_IDENTIFIER}" bundle:"${ENDPOINT_ROOT}/build_macos/trusttunnel_endpoint"
            bundle exec fastlane notari id:"${CODESIGN_IDENTIFIER}" bundle:"${ENDPOINT_ROOT}/build_macos/setup_wizard"
            bundle exec fastlane remove_certs || true

            pushd build_macos
              cp ${ENDPOINT_ROOT}/LICENSE .
              gpg --default-key "${GPG_KEY}" \
                  --detach-sig \
                  --passphrase "${bamboo.gpgPassword}" \
                  --pinentry-mode loopback \
                  trusttunnel_endpoint
              gpg --default-key "${GPG_KEY}" \
                  --detach-sig \
                  --passphrase "${bamboo.gpgPassword}" \
                  --pinentry-mode loopback \
                  setup_wizard
              NAME=trusttunnel-v${VERSION}-macos-universal
              tar zcf ${NAME}.tar.gz -s ",^,${NAME}/," trusttunnel_endpoint trusttunnel_endpoint.sig setup_wizard setup_wizard.sig LICENSE
              NAME_DBG=${NAME}-dbgsym
              tar zcf ${NAME_DBG}.tar.gz -s ",^,${NAME_DBG}/," trusttunnel_endpoint.dSYM setup_wizard.dSYM
            popd
  requirements:
    - ephemeral
    - image: registry.int.agrd.dev/macos/tahoe-build-agent-xcode26.1.1:latest
  artifact-subscriptions: [ ]
  artifacts:
    - name: Build for macOS
      location: build_macos
      pattern: 'trusttunnel-*.tar.gz'
      required: true
      shared: true

Deploy artifacts:
  key: DA
  docker:
    image: adguard/core-libs:2.8
    volumes:
      ${bamboo.working.directory}: ${bamboo.working.directory}
      ${bamboo.tmp.directory}: ${bamboo.tmp.directory}
      ${bamboo.git.cache.directory}: ${bamboo.git.cache.directory}
      ${system.HOME}/.ssh: /root/.ssh
    docker-run-arguments: [ ]
  tasks:
    - clean
    - checkout:
        description: Checkout Default Repository
        force-clean-build: 'true'
    - script:
        interpreter: SHELL
        scripts:
          - |-
            #!/bin/bash
            set -x -e

            printf "%b\n" "${bamboo_sshSecretKey}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa

            git config user.email "Bamboo"
            git config user.name "Bamboo"

            VERSION=$(cat endpoint/Cargo.toml | grep "version = " | head -n 1 | sed -e 's/version = "\(.*\)"/\1/')

            # Update version in install script and push tag
            sed -i -e "s/^version='[0-9\.]*'$/version='${VERSION}'/" scripts/install.sh
            git add scripts/install.sh
            git commit -m "skipci: Automatic increment version for install script"
            TAG=v${VERSION}
            git tag -d ${TAG} || true
            git tag ${TAG}
            git remote set-url origin "${bamboo_planRepository_1_repositoryUrl}"
            git push origin ${TAG}
            git push origin HEAD

            git clone https://${bamboo_githubPublicRepoPassword}:@github.com/TrustTunnel/TrustTunnel/
            cd TrustTunnel
            CHANGELOG_URL="https://github.com/TrustTunnel/TrustTunnel/blob/${TAG}/CHANGELOG.md"
            gh config set -h github.com oauth_token "${bamboo_githubPublicRepoPassword}" || exit 1
            gh release delete -y ${TAG} || true
            gh release create ${TAG} -t "${TAG}" -n "See [CHANGELOG.md](${CHANGELOG_URL}) for the list of changes."
            gh release upload ${TAG} ../build_linux/trusttunnel-v${VERSION}-linux-x86_64.tar.gz
            gh release upload ${TAG} ../build_linux/trusttunnel-v${VERSION}-linux-aarch64.tar.gz
            gh release upload ${TAG} ../build_linux/trusttunnel-v${VERSION}-linux-x86_64-dbgsym.tar.gz
            gh release upload ${TAG} ../build_linux/trusttunnel-v${VERSION}-linux-aarch64-dbgsym.tar.gz
            gh release upload ${TAG} ../build_macos/trusttunnel-v${VERSION}-macos-universal.tar.gz
            gh release upload ${TAG} ../build_macos/trusttunnel-v${VERSION}-macos-universal-dbgsym.tar.gz
  requirements:
    - adg-privileged-docker
  artifact-subscriptions:
    - artifact: Build for Linux
      destination: build_linux
    - artifact: Build for macOS
      destination: build_macos
  artifacts: []

repositories:
  - core-libs/vpn-libs-endpoint:
      scope: global

branches:
  create: manually
  delete: never
  link-to-jira: true

notifications: [ ]

labels: [ ]

other:
  concurrent-build-plugin: system-default
